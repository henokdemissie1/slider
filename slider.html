<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Before / After Slider</title>

<style>
  .compare {
    position: relative;
    display: grid;
    width: 100%;
    max-width: 800px;
    aspect-ratio: 16/9;
    overflow: hidden;
    margin: 40px auto;
  }

  .compare > * {
    grid-area: 1 / 1;
  }

  section img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .before {
    mask: linear-gradient(to right, #000 0, var(--pos, 50%), transparent 0);
  }

  .after {
    mask: linear-gradient(to right, transparent 0, var(--pos, 50%), #000 0);
  }

  input[type="range"] {
    z-index: 10;
    appearance: none;
    background: transparent;
    cursor: pointer;
  }

  input[type="range"]::-webkit-slider-thumb {
    appearance: none;
    width: 4px;
    height: 100vh;
    background: black;
  }

  input[type="range"]::-moz-range-thumb {
    width: 4px;
    height: 100vh;
    background: black;
  }
</style>
</head>

<body>

<div class="compare">
  <section class="before">
    <img src="before.jpg">
  </section>

  <section class="after">
    <img src="after.jpg">
  </section>

  <input type="range" id="range" min="0" max="100" value="50" step="0.1">
</div>

<script>
  const range = document.getElementById("range");
  range.oninput = () =>
    document.body.style.setProperty("--pos", range.value + "%");
</script>

</body>
</html>
